# Workers are set to NOT auto start so we have time to enforce permissions on the cache first

[group:misp-workers]
programs=default,email,cache,prio,update,scheduler

[program:default]
directory=/workspace/MISP/MISP
command=/workspace/MISP/MISP/app/Console/cake start_worker default
process_name=%(program_name)s_%(process_num)02d
numprocs=1
autostart=false
autorestart=true
redirect_stderr=false
stderr_logfile=/tmp/misp-workers-errors.log
stdout_logfile=/tmp/misp-workers.log
directory=/workspace/MISP/MISP
user=www-data

